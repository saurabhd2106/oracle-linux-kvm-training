---
# 02 - Give the admin user (opc) a working kubeconfig so kubectl works over SSH,
# and also stage a root kubeconfig used by the Calico apply steps in this role.

- name: Resolve the admin user's home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ kubeconfig_user }}"

- name: Set the admin user's home path
  ansible.builtin.set_fact:
    kubeconfig_user_home: "{{ getent_passwd[kubeconfig_user][4] }}"

- name: Create ~/.kube for the admin user
  ansible.builtin.file:
    path: "{{ kubeconfig_user_home }}/.kube"
    state: directory
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"
    mode: "0750"

- name: Install kubeconfig for the admin user
  ansible.builtin.copy:
    src: "{{ kubeadm_admin_conf }}"
    dest: "{{ kubeconfig_user_home }}/.kube/config"
    remote_src: true
    owner: "{{ kubeconfig_user }}"
    group: "{{ kubeconfig_user }}"
    mode: "0600"

- name: Create root's ~/.kube (used by kubectl calls in this play)
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install kubeconfig for root
  ansible.builtin.copy:
    src: "{{ kubeadm_admin_conf }}"
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"
