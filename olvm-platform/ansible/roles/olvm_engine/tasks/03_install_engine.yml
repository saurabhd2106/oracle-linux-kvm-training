---
# 03 - Install the Manager and refresh its setup plugins so engine-setup does
# not stop to ask about updating its own packages.

- name: Install the ovirt-engine package
  ansible.builtin.dnf:
    name: "{{ olvm_engine_package }}"
    state: present

- name: Update the engine-setup plugin packages to the latest available
  ansible.builtin.dnf:
    name: "{{ olvm_engine_setup_packages }}"
    state: latest
  register: olvm_setup_pkgs

- name: Confirm the engine-setup binary is present
  ansible.builtin.command: command -v engine-setup
  register: olvm_engine_setup_bin
  changed_when: false

- name: Show the engine-setup location
  ansible.builtin.debug:
    msg: "engine-setup available at {{ olvm_engine_setup_bin.stdout }}"
