---
# 02 - Install the OLVM 4.5 release RPM and enable the repositories it manages.

- name: Ensure dnf-plugins-core is available for config-manager
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present

- name: Enable the base OS repository (required before the release package)
  ansible.builtin.command: dnf config-manager --enable ol8_baseos_latest
  register: olvm_baseos_enable
  changed_when: "'ol8_baseos_latest' in olvm_baseos_enable.stdout"

- name: Install the OLVM 4.5 release package
  ansible.builtin.dnf:
    name: "{{ olvm_release_package }}"
    state: present

- name: Enable the repositories required by the Engine
  ansible.builtin.command: dnf config-manager --enable {{ olvm_required_repos | join(' ') }}
  register: olvm_repo_enable
  changed_when: false

- name: Verify the required repositories are enabled
  ansible.builtin.command: dnf repolist --enabled
  register: olvm_repolist
  changed_when: false

- name: Assert every required repository is enabled
  ansible.builtin.assert:
    that:
      - "item in olvm_repolist.stdout"
    fail_msg: >-
      Required repository '{{ item }}' is not enabled. Enable it manually with
      `dnf config-manager --enable {{ item }}` and re-run.
    quiet: true
  loop: "{{ olvm_required_repos }}"

- name: Refresh the dnf metadata cache
  ansible.builtin.dnf:
    update_cache: true
