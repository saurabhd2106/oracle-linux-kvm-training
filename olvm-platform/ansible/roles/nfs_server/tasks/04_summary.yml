---
# 04 - A scannable summary and the exact path to add as an OLVM storage domain.

- name: Print the NFS server readiness summary
  ansible.builtin.debug:
    msg:
      - "==================== NFS SERVER SUMMARY ======================="
      - "Host              : {{ inventory_hostname }} ({{ ansible_facts['default_ipv4']['address'] | default('n/a') }})"
      - "Data device       : {{ nfs_data_device }} ({{ nfs_filesystem }})"
      - "Export path       : {{ nfs_export_path }} (owner {{ nfs_owner_uid }}:{{ nfs_owner_gid }})"
      - "ISO export path   : {{ nfs_iso_export_path if (nfs_configure_iso_export | bool) else '(disabled)' }}"
      - "Allowed clients   : {{ nfs_allowed_clients }}"
      - "Export options    : {{ nfs_export_options }}"
      - "Firewall          : {{ nfs_summary_firewall | default('not configured') }}"
      - "==============================================================="
      - "NEXT: in the OLVM Admin Portal go to Storage > Domains > New Domain and add"
      - "      an NFS data domain with export path:"
      - "        {{ nfs_server_address | default(ansible_facts['default_ipv4']['address'] | default('<nfs_private_ip>')) }}:{{ nfs_export_path }}"
      - "      and (Phase 2) an NFS ISO domain with export path:"
      - "        {{ nfs_server_address | default(ansible_facts['default_ipv4']['address'] | default('<nfs_private_ip>')) }}:{{ nfs_iso_export_path }}"
      - "      (both are attached automatically by the olvm_config role)."
      - "==============================================================="
