---
# 02 - Install the NFS server, publish the export to the allowed clients, and
# make sure the service is enabled and running.

- name: Install nfs-utils
  ansible.builtin.dnf:
    name: nfs-utils
    state: present

- name: Publish the OLVM export in /etc/exports.d
  ansible.builtin.copy:
    dest: /etc/exports.d/olvm.exports
    owner: root
    group: root
    mode: "0644"
    content: "{{ nfs_export_path }} {{ nfs_allowed_clients }}({{ nfs_export_options }})\n"
  notify: Reload nfs exports

- name: Enable and start the NFS server
  ansible.builtin.systemd:
    name: nfs-server
    enabled: true
    state: started

- name: Flush handlers so the export is active before verification
  ansible.builtin.meta: flush_handlers

- name: List the active NFS exports
  ansible.builtin.command: exportfs -v
  register: nfs_exportfs
  changed_when: false

- name: Show the active NFS exports
  ansible.builtin.debug:
    var: nfs_exportfs.stdout_lines
