---
# Authoritative defaults for the olvm_host_prep role. These are overridden by
# inventory/group_vars/kvm_hosts.yml when running the full playbook, and they
# guarantee sane values when individual steps are run via --tags.

# --- OLVM release / repositories -------------------------------------------
# OLVM 4.5 release RPM for Oracle Linux 9. Parameterized so the version is not
# hardcoded forever; bump this and olvm_required_repos together.
olvm_release_package: "oracle-ovirt-release-45-el9"

# Minimum Oracle Linux version. Step 01 fails fast on anything older.
olvm_min_ol_version: "9.6"

# Repositories that must end up enabled after the release package is installed.
olvm_required_repos:
  - ol9_ovirt45
  - ol9_ovirt45_extras

# OCI base-image extras that can pull in conflicting package versions. Disabled
# if present and enabled. extra_repos_to_disable is unioned with this list so
# the base list stays stable as new cloud image variants are added.
repos_to_disable:
  - ol9_ksplice
  - ol9_oci_included
extra_repos_to_disable: []

# --- Required, no default (fail fast if not provided) ----------------------
# The OLVM Engine's SSH public key: either the literal key string or a path to a
# local file containing it. Never hardcoded and never fetched from the Engine.
engine_ssh_public_key: ""

# Fully qualified hostname to assign to this host. Normally set per host in the
# inventory; kept here so a --tags run of step 02 still has a defined value.
target_hostname: ""

# --- Firewall / cloud security list ----------------------------------------
# Ports the Engine must reach on the host. Opened in local firewalld when active.
# SSH (22) is included so the Engine can log in to deploy vdsm. Machine-to-machine
# traffic from inside the VCN is additionally trusted via internal_network_cidr,
# which covers every other internal port these machines use.
firewall_ports:
  - { port: 22, proto: tcp, required: true }
  - { port: 54321, proto: tcp, required: true }
  - { port: 54322, proto: tcp, required: false }
  - { port: "5900-6923", proto: tcp, required: true }
  - { port: "49152-49216", proto: tcp, required: true }
  - { port: 16509, proto: tcp, required: true }
  - { port: 16514, proto: tcp, required: true }

# CIDR trusted for all machine-to-machine traffic inside the VCN. Set in
# group_vars/all.yml; defaulted here so a --tags step 05 run still works.
internal_network_cidr: "10.0.0.0/16"

# --- Pre-check --------------------------------------------------------------
# Name of the OLVM pre-check script shipped by the release package. It may not be
# on PATH, so step 04 locates it via `rpm -ql` rather than assuming a path.
olvm_precheck_script_name: "olvm-pre-check.py"

# Packages whose presence indicates a general KVM/libvirt stack is already
# installed. Used both by the step 01 dirty-host guard and by step 04 to decide
# whether the pre-check package-count check is a genuine failure or a known
# false-positive on cloud base images.
olvm_conflicting_packages:
  - libvirt-daemon
  - qemu-kvm
  - vdsm
