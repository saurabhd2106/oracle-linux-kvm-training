---
# 03 - Install ONLY the OLVM release package (never any KVM/libvirt/virtualization
# packages - OLVM installs its own pinned stack when the host is added) and make
# sure the right repositories are enabled and the conflicting ones are disabled.

- name: Ensure dnf-plugins-core is available for config-manager
  ansible.builtin.dnf:
    name: dnf-plugins-core
    state: present

- name: Install the OLVM release package
  ansible.builtin.dnf:
    name: "{{ olvm_release_package }}"
    state: present

- name: Enable the repositories required by OLVM
  ansible.builtin.command: "dnf config-manager --enable {{ item }}"
  loop: "{{ olvm_required_repos }}"
  register: olvm_repo_enable
  changed_when: false

- name: List the currently enabled repositories
  ansible.builtin.command: dnf repolist --enabled
  register: olvm_repolist_enabled
  changed_when: false

# Parse the repo id (first whitespace-delimited column) from each output line.
# Regex word-boundary checks are avoided on purpose: in a Jinja string literal
# '\b' becomes a backspace character, so the previous search()-based checks never
# matched.
- name: Determine which repositories are currently enabled
  ansible.builtin.set_fact:
    olvm_enabled_repo_ids: "{{ olvm_repolist_enabled.stdout_lines | select | map('split') | map('first') | list }}"

- name: Assert every required repository is enabled
  ansible.builtin.assert:
    that:
      - item in olvm_enabled_repo_ids
    fail_msg: >-
      Required repository '{{ item }}' is not enabled after installing
      {{ olvm_release_package }}. Enable it manually with
      `dnf config-manager --enable {{ item }}` and re-run, or confirm the
      release package name/version is correct for this OS.
    success_msg: "Required repository '{{ item }}' is enabled."
    quiet: true
  loop: "{{ olvm_required_repos }}"

- name: List all known repositories (to find which conflicting ones exist)
  ansible.builtin.command: dnf repolist --all
  register: olvm_repolist_all
  changed_when: false

- name: Determine which repositories exist at all
  ansible.builtin.set_fact:
    olvm_all_repo_ids: "{{ olvm_repolist_all.stdout_lines | select | map('split') | map('first') | list }}"

- name: Compute the set of conflicting repos to disable
  ansible.builtin.set_fact:
    olvm_repos_to_disable_all: "{{ (repos_to_disable + extra_repos_to_disable) | unique }}"

- name: Disable conflicting repositories that are present and enabled
  ansible.builtin.command: "dnf config-manager --disable {{ item }}"
  loop: "{{ olvm_repos_to_disable_all }}"
  register: olvm_repo_disable
  when:
    - item in olvm_all_repo_ids
    - item in olvm_enabled_repo_ids
  changed_when: olvm_repo_disable is not skipped

- name: Refresh the dnf metadata cache
  ansible.builtin.dnf:
    update_cache: true

- name: Record which conflicting repos were disabled for the final summary
  ansible.builtin.set_fact:
    olvm_summary_repos_disabled: >-
      {{ olvm_repos_to_disable_all
         | select('in', olvm_enabled_repo_ids)
         | list }}
