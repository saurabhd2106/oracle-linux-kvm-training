---
# 06 - Authorize the OLVM Engine's SSH public key for root so the Engine can log
# in and deploy vdsm when the host is added. Key-based access only: we never
# enable root password auth and never touch PermitRootLogin.

- name: Check whether engine_ssh_public_key points to a local file
  ansible.builtin.stat:
    path: "{{ engine_ssh_public_key }}"
  delegate_to: localhost
  become: false
  register: olvm_engine_key_file
  # A raw key string can be long; stat on it is harmless and just returns exists=false.
  failed_when: false

- name: Resolve the Engine public key (literal string or file contents)
  ansible.builtin.set_fact:
    olvm_engine_key: >-
      {{ (lookup('file', engine_ssh_public_key) | trim)
         if (olvm_engine_key_file.stat.exists | default(false)) and (olvm_engine_key_file.stat.isreg | default(false))
         else (engine_ssh_public_key | trim) }}

- name: Validate the resolved key looks like an SSH public key
  ansible.builtin.assert:
    that:
      - olvm_engine_key is match('^(ssh-(rsa|ed25519|dss)|ecdsa-sha2-|sk-)')
    fail_msg: >-
      engine_ssh_public_key did not resolve to a valid SSH public key. Provide
      the Engine's public key line (e.g. 'ssh-rsa AAAA... engine') or a path to a
      file containing it.
    success_msg: "Engine public key resolved and looks valid."
    quiet: true
  no_log: true

- name: Ensure /root/.ssh exists with correct ownership and permissions
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Authorize the Engine public key for root (idempotent, no duplicates)
  ansible.posix.authorized_key:
    user: root
    key: "{{ olvm_engine_key }}"
    state: present
    manage_dir: false
    path: /root/.ssh/authorized_keys
  register: olvm_authorized_key
  no_log: true

- name: Ensure authorized_keys ownership and permissions are correct
  ansible.builtin.file:
    path: /root/.ssh/authorized_keys
    owner: root
    group: root
    mode: "0600"

- name: Record the SSH authorization result for the final summary
  ansible.builtin.set_fact:
    olvm_summary_ssh: >-
      {{ 'Engine key already present (no change)'
         if not (olvm_authorized_key is changed)
         else 'Engine key added to /root/.ssh/authorized_keys' }}
