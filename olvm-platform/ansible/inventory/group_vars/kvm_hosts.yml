---
# Environment-specific values for the kvm_hosts group. Role defaults live in
# roles/olvm_host_prep/defaults/main.yml; override any of them here.

# OLVM 4.5 release RPM for Oracle Linux 9. Bump the version string here (and
# olvm_required_repos below) when moving to a newer OLVM release.
olvm_release_package: oracle-ovirt-release-45-el9

# Minimum Oracle Linux version the host must run. Step 01 fails fast below this.
olvm_min_ol_version: "9.6"

# Repositories that must be enabled after the release package is installed. The
# oracle-ovirt-release-45-el9 package creates these repo IDs (same as on el8);
# they are enabled by default but asserted/re-enabled here.
olvm_required_repos:
  - ovirt-4.5
  - ovirt-4.5-extra

# OCI base-image extras that can pull in conflicting package versions. These are
# disabled if present and enabled. Add cloud-image-specific repos to
# extra_repos_to_disable rather than editing this base list.
repos_to_disable:
  - ol9_ksplice
  - ol9_oci_included
extra_repos_to_disable: []

# OPTIONAL: the OLVM Engine's SSH public key. Leave empty to have olvm_host_prep
# derive it automatically on the Engine host (the 'engine' inventory group) from
# its private key /etc/pki/ovirt-engine/keys/engine_id_rsa via `ssh-keygen -y`
# (engine-setup only stores the private key), so no manual copy is needed. Only
# set this to override the source: paste the key string here, or a path to a local
# file containing it. Do NOT commit a real key to a shared repo.
engine_ssh_public_key: ""

# Ports the OLVM Engine needs to reach on the host. Opened in local firewalld
# when it is active. SSH (22) is included so the Engine can log in over SSH to
# deploy vdsm when the host is added. Machine-to-machine traffic from inside the
# VCN is additionally trusted via internal_network_cidr (see all.yml), which
# covers every other internal port.
firewall_ports:
  - { port: 22, proto: tcp, required: true }
  - { port: 54321, proto: tcp, required: true }
  - { port: 54322, proto: tcp, required: false }
  - { port: "5900-6923", proto: tcp, required: true }
  - { port: "49152-49216", proto: tcp, required: true }
  - { port: 16509, proto: tcp, required: true }
  - { port: 16514, proto: tcp, required: true }
