---
# Fully qualified domain name for the Engine. OLVM requires a resolvable FQDN
# (forward and reverse). The preflight step writes an /etc/hosts entry mapping
# this name to the host's primary IP so engine-setup succeeds on a plain OCI VM.
olvm_engine_fqdn: olvm-engine.lab.local

# Organization name embedded in the internal CA certificate.
olvm_pki_org: lab.local

# Engine admin password (login: admin@ovirt). REQUIRED - there is no default.
# It lives encrypted in the sibling vault.yml (Ansible Vault) and auto-loads with
# this group. Manage it with:
#   ansible-vault edit inventory/group_vars/engine/vault.yml
# The vault is unlocked non-interactively via the .vault_pass file referenced from
# ansible.cfg. olvm_allow_weak_password=yes below keeps simple training passwords
# working; override for production.
olvm_allow_weak_password: true

# OLVM 4.5 release RPM and the repositories it manages on Oracle Linux 8.
olvm_release_package: oracle-ovirt-release-45-el8
olvm_required_repos:
  - ol8_baseos_latest
  - ol8_appstream
  - ol8_kvm_appstream
  - ovirt-4.5
  - ovirt-4.5-extra
  - ol8_gluster_appstream

# The Manager package and its setup plugins (updated before engine-setup to
# avoid the interactive "update setup packages" prompt).
olvm_engine_package: ovirt-engine
olvm_engine_setup_packages:
  - ovirt-engine-setup
  - ovirt-engine-setup-plugin-websocket-proxy
  - ovirt-engine-dwh-setup
  - ovirt-engine-dwh-grafana-integration-setup
  - ovirt-engine-keycloak-setup

# Engine feature toggles baked into the OTOPI answer file.
olvm_application_mode: both
olvm_configure_dwh: true
olvm_configure_grafana: true
olvm_configure_keycloak: true
olvm_configure_ovn: true

olvm_engine_service: ovirt-engine
olvm_firewall_service: firewalld

ansible_python_interpreter: /usr/bin/python3.9