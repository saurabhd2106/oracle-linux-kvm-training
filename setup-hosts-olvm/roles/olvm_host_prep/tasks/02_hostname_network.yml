---
# 02 - Give the host its FQDN, make sure that name resolves (falling back to
# /etc/hosts in DNS-less labs), and confirm the hardware can actually run VMs.

- name: Set the system hostname to the target FQDN
  ansible.builtin.hostname:
    name: "{{ target_hostname }}"

- name: Check forward DNS resolution for the FQDN
  ansible.builtin.command: "getent hosts {{ target_hostname }}"
  register: olvm_dns_lookup
  changed_when: false
  failed_when: false

- name: Ensure an /etc/hosts entry exists when forward DNS resolution fails
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\s*{{ ansible_facts["default_ipv4"]["address"] | regex_escape }}\s'
    line: >-
      {{ ansible_facts['default_ipv4']['address'] }}
      {{ target_hostname }} {{ target_hostname.split('.')[0] }}
    state: present
  when: olvm_dns_lookup.rc != 0

- name: Record how the FQDN resolves for the final summary
  ansible.builtin.set_fact:
    olvm_summary_dns: >-
      {{ 'resolved via DNS: ' ~ (olvm_dns_lookup.stdout | trim)
         if olvm_dns_lookup.rc == 0
         else 'DNS lookup failed - added /etc/hosts entry '
              ~ ansible_facts['default_ipv4']['address'] ~ ' ' ~ target_hostname }}

- name: Check for the KVM device node
  ansible.builtin.stat:
    path: /dev/kvm
  register: olvm_dev_kvm

- name: Check that the CPU reports hardware virtualization support
  ansible.builtin.command: lscpu
  register: olvm_lscpu
  changed_when: false

- name: Assert hardware virtualization is available
  ansible.builtin.assert:
    that:
      - olvm_dev_kvm.stat.exists
      - olvm_lscpu.stdout is search('vmx') or olvm_lscpu.stdout is search('svm')
    fail_msg: >-
      Hardware virtualization is not available on this host.
      /dev/kvm present: {{ olvm_dev_kvm.stat.exists }};
      VT-x/AMD-V flag (vmx/svm) reported by lscpu:
      {{ olvm_lscpu.stdout is search('vmx') or olvm_lscpu.stdout is search('svm') }}.
      This host cannot run as an OLVM KVM host. On OCI, ensure the shape exposes
      nested/hardware virtualization.
    success_msg: "Hardware virtualization confirmed (/dev/kvm present, VT-x/AMD-V enabled)."
    quiet: true

- name: Record the virtualization check result for the final summary
  ansible.builtin.set_fact:
    olvm_summary_virt: "/dev/kvm present and VT-x/AMD-V enabled."
