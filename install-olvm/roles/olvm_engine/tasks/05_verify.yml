---
# 05 - Confirm the Engine is running and print the access URLs.

- name: Ensure the ovirt-engine service is enabled and running
  ansible.builtin.systemd:
    name: "{{ olvm_engine_service }}"
    enabled: true
    state: started

- name: Confirm ovirt-engine status with systemctl
  ansible.builtin.command: systemctl status {{ olvm_engine_service }}
  register: olvm_engine_status
  changed_when: false

- name: Show systemctl status ovirt-engine output
  ansible.builtin.debug:
    var: olvm_engine_status.stdout_lines

- name: List the firewalld ports opened for the Engine
  ansible.builtin.command: firewall-cmd --list-all
  register: olvm_firewall_state
  changed_when: false
  failed_when: false

- name: Show the firewalld configuration
  ansible.builtin.debug:
    var: olvm_firewall_state.stdout_lines
  when: olvm_firewall_state.rc == 0

- name: Show the OLVM access URLs
  ansible.builtin.debug:
    msg:
      - "OLVM Engine is up. Access it from a machine that can resolve {{ olvm_engine_fqdn }}:"
      - "Administration Portal : https://{{ olvm_engine_fqdn }}/ovirt-engine/webadmin  (login admin@ovirt)"
      - "VM Portal             : https://{{ olvm_engine_fqdn }}/ovirt-engine/web-ui"
      - "Grafana Monitoring    : https://{{ olvm_engine_fqdn }}/ovirt-engine-grafana/  (login admin)"
      - "Keycloak Admin Console: https://{{ olvm_engine_fqdn }}/ovirt-engine-auth/admin  (login admin)"
      - "If your workstation cannot resolve the FQDN, add a matching /etc/hosts entry pointing it at the VM public IP."
